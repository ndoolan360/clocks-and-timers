<!DOCTYPE html>
<title>Clocks and Timers</title>
<link rel="stylesheet" href="./styles/clocks-and-timers.css" />
<script defer src="./src/main.js" type="module"></script>

<noscript>You need to enable Javascript to run this app.</noscript>

<ul id="clocks-and-timers"></ul>

<form id="controls">
  <fieldset>
    <legend class="sr-only">Controls</legend>

    <button id="add-timezone-overlap" type="button" title="Add timezone overlap" aria-label="Add timezone overlap"
      disabled>
      +🌏
    </button>
    <button id="add-pomodoro-timer" type="button" title="Add pomodoro timer" aria-label="Add pomodoro timer" disabled>
      +🍅
    </button>
    <button id="add-countdown-timer" type="button" title="Add countdown timer" aria-label="Add countdown timer"
      disabled>
      +⏲️
    </button>
    <button id="add-stopwatch-clock" type="button" title="Add stopwatch" aria-label="Add stopwatch" disabled>
      +⏱️
    </button>
    <button id="add-analog-clock" type="button" title="Add analog clock" aria-label="Add analog clock" disabled>
      +🕰️
    </button>
  </fieldset>
</form>
