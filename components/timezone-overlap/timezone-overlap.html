<div class="wrapper">
  <form class="component-controls">
    <fieldset>
      <legend class="sr-only">Timezone Overlap Controls</legend>
      <button id="settings-btn" type="button" title="Timezone overlap settings" aria-label="Timezone overlap settings"
        popovertarget="settings-popover">⚙️</button>
      <button id="remove-btn" type="button" title="Remove timezone overlap" aria-label="Remove timezone overlap"
        disabled>🗑️</button>
    </fieldset>
  </form>

  <div id="settings-popover" popover="auto">
    <button class="popover-close" type="button" popovertarget="settings-popover" popovertargetaction="hide"
      title="Close" aria-label="Close">✕</button>

    <div class="tz-slot" id="tz-slot-0">
      <span class="tz-swatch" id="tz-swatch-0"></span>
      <div class="tz-fields">
        <label class="label">
          <span>Timezone 1</span>
          <select id="tz-select-0">
            <option value="">Local</option>
          </select>
        </label>
        <label class="label">
          <span>Work hours</span>
          <div class="work-hours">
            <input id="tz-start-0" type="number" min="0" max="23" value="9" />
            <span>–</span>
            <input id="tz-end-0" type="number" min="1" max="24" value="17" />
          </div>
        </label>
      </div>
      <button type="button" class="remove-tz" id="tz-remove-0" title="Remove timezone" hidden>×</button>
    </div>

    <div class="tz-slot" id="tz-slot-1" hidden>
      <span class="tz-swatch" id="tz-swatch-1"></span>
      <div class="tz-fields">
        <label class="label">
          <span>Timezone 2</span>
          <select id="tz-select-1">
            <option value="">Local</option>
          </select>
        </label>
        <label class="label">
          <span>Work hours</span>
          <div class="work-hours">
            <input id="tz-start-1" type="number" min="0" max="23" value="9" />
            <span>–</span>
            <input id="tz-end-1" type="number" min="1" max="24" value="17" />
          </div>
        </label>
      </div>
      <button type="button" class="remove-tz" id="tz-remove-1" title="Remove timezone">×</button>
    </div>

    <div class="tz-slot" id="tz-slot-2" hidden>
      <span class="tz-swatch" id="tz-swatch-2"></span>
      <div class="tz-fields">
        <label class="label">
          <span>Timezone 3</span>
          <select id="tz-select-2">
            <option value="">Local</option>
          </select>
        </label>
        <label class="label">
          <span>Work hours</span>
          <div class="work-hours">
            <input id="tz-start-2" type="number" min="0" max="23" value="9" />
            <span>–</span>
            <input id="tz-end-2" type="number" min="1" max="24" value="17" />
          </div>
        </label>
      </div>
      <button type="button" class="remove-tz" id="tz-remove-2" title="Remove timezone">×</button>
    </div>

    <div class="tz-slot" id="tz-slot-3" hidden>
      <span class="tz-swatch" id="tz-swatch-3"></span>
      <div class="tz-fields">
        <label class="label">
          <span>Timezone 4</span>
          <select id="tz-select-3">
            <option value="">Local</option>
          </select>
        </label>
        <label class="label">
          <span>Work hours</span>
          <div class="work-hours">
            <input id="tz-start-3" type="number" min="0" max="23" value="9" />
            <span>–</span>
            <input id="tz-end-3" type="number" min="1" max="24" value="17" />
          </div>
        </label>
      </div>
      <button type="button" class="remove-tz" id="tz-remove-3" title="Remove timezone">×</button>
    </div>

    <label class="label">
      <div class="preset-chips">
        <button type="button" id="add-tz-btn">+ Add timezone</button>
      </div>
    </label>
  </div>

  <svg id="overlap-svg" viewBox="0 0 100 100" role="img" aria-label="Timezone overlap">
    <circle cx="50" cy="50" r="42" class="face-ring" />
    <circle cx="50" cy="50" r="42" class="tick-ring tick-minor" />
    <circle cx="50" cy="50" r="42" class="tick-ring tick-major" />
    <text x="50" y="4" class="hour-label" text-anchor="middle" dominant-baseline="middle">24</text>
    <text x="96" y="50" class="hour-label" text-anchor="middle" dominant-baseline="middle">6</text>
    <text x="50" y="96" class="hour-label" text-anchor="middle" dominant-baseline="middle">12</text>
    <text x="4" y="50" class="hour-label" text-anchor="middle" dominant-baseline="middle">18</text>

    <g id="ring-0">
      <circle id="ring-bg-0" cx="50" cy="50" r="36" class="ring-bg" fill="none" stroke-opacity="0.15" />
      <path id="ring-arc-0" class="ring-arc" fill="none" stroke-linecap="round" />
    </g>
    <g id="ring-1" hidden>
      <circle id="ring-bg-1" cx="50" cy="50" r="27" class="ring-bg" fill="none" stroke-opacity="0.15" />
      <path id="ring-arc-1" class="ring-arc" fill="none" stroke-linecap="round" />
    </g>
    <g id="ring-2" hidden>
      <circle id="ring-bg-2" cx="50" cy="50" r="18" class="ring-bg" fill="none" stroke-opacity="0.15" />
      <path id="ring-arc-2" class="ring-arc" fill="none" stroke-linecap="round" />
    </g>
    <g id="ring-3" hidden>
      <circle id="ring-bg-3" cx="50" cy="50" r="9" class="ring-bg" fill="none" stroke-opacity="0.15" />
      <path id="ring-arc-3" class="ring-arc" fill="none" stroke-linecap="round" />
    </g>

    <line id="now-hand" x1="50" y1="50" class="now-hand" />
    <circle id="center-dot" cx="50" cy="50" r="1.5" class="center-dot" />
  </svg>

  <div id="tz-legend">
    <div id="legend-0" class="legend-row">
      <span id="legend-swatch-0" class="legend-swatch"></span>
      <span id="legend-text-0" class="legend-text"></span>
    </div>
    <div id="legend-1" class="legend-row" hidden>
      <span id="legend-swatch-1" class="legend-swatch"></span>
      <span id="legend-text-1" class="legend-text"></span>
    </div>
    <div id="legend-2" class="legend-row" hidden>
      <span id="legend-swatch-2" class="legend-swatch"></span>
      <span id="legend-text-2" class="legend-text"></span>
    </div>
    <div id="legend-3" class="legend-row" hidden>
      <span id="legend-swatch-3" class="legend-swatch"></span>
      <span id="legend-text-3" class="legend-text"></span>
    </div>
  </div>
</div>
