<div class="wrapper">
  <form class="component-controls">
    <fieldset>
      <legend class="sr-only">Clock Controls</legend>
      <button id="settings-btn" type="button" title="Clock settings" aria-label="Clock settings" popovertarget="settings-popover">⚙️</button>
      <button id="remove-btn" type="button" title="Remove clock" aria-label="Remove clock" disabled>🗑️</button>
    </fieldset>
  </form>
  <div id="settings-popover" popover="auto">
    <button class="popover-close" type="button" popovertarget="settings-popover" popovertargetaction="hide" title="Close" aria-label="Close">✕</button>
    <div>
      <label class="label">
        <span>Timezone</span>
        <select id="setting-timezone" name="timezone">
          <option value="" selected>Local</option>
        </select>
      </label>
    </div>
  </div>
  <svg id="clock" viewBox="0 0 100 100" class="inset-svg">
    <circle cx="50" cy="40" r="39" id="clock-face" />
    <circle cx="50" cy="40" r="37" class="tick-ring minor" />
    <circle cx="50" cy="40" r="37" class="tick-ring major" />
    <g class="hand">
      <line x1="50" y1="40" x2="50" y2="20" id="hour-hand" />
      <line x1="50" y1="40" x2="50" y2="10" id="minute-hand" />
      <line x1="50" y1="40" x2="50" y2="05" id="second-hand" />
    </g>
    <foreignObject y="80" width="100" height="20">
      <time xmlns="http://www.w3.org/1999/xhtml" id="clock-text" datetime=""></time>
    </foreignObject>
  </svg>
</div>
