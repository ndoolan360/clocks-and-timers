<div class="wrapper">
  <form class="component-controls">
    <fieldset>
      <legend class="sr-only">Stopwatch Controls</legend>
      <button id="pause-btn" type="button" title="Start stopwatch" aria-label="Start stopwatch" disabled>▶︎</button>
      <button id="reset-btn" type="button" title="Reset stopwatch" aria-label="Reset stopwatch" disabled>↻</button>
      <button id="remove-btn" type="button" title="Remove stopwatch" aria-label="Remove stopwatch" disabled>🗑️</button>
    </fieldset>
  </form>
  <svg id="clock" class="inset-svg" viewBox="0 0 100 100">
    <circle cx="50" cy="40" r="39" id="clock-face" />
    <circle cx="50" cy="40" r="37" class="tick-ring minor" />
    <circle cx="50" cy="40" r="37" class="tick-ring major" />
    <g class="dial-number">
      <text id="main-num-0"></text>
      <text id="main-num-1"></text>
      <text id="main-num-2"></text>
      <text id="main-num-3"></text>
      <text id="main-num-4"></text>
      <text id="main-num-5"></text>
      <text id="main-num-6"></text>
      <text id="main-num-7"></text>
      <text id="main-num-8"></text>
      <text id="main-num-9"></text>
      <text id="main-num-10"></text>
      <text id="main-num-11"></text>
    </g>
    <circle cx="50" cy="25" r="11" class="sub-dial-face" />
    <circle cx="50" cy="25" r="10" class="tick-ring sub-dial" />
    <g class="dial-number sub-dial-number">
      <text id="minute-num-0"></text>
      <text id="minute-num-1"></text>
      <text id="minute-num-2"></text>
      <text id="minute-num-3"></text>
      <text id="minute-num-4"></text>
      <text id="minute-num-5"></text>
      <text id="minute-num-6"></text>
      <text id="minute-num-7"></text>
      <text id="minute-num-8"></text>
      <text id="minute-num-9"></text>
    </g>
    <line x1="50" y1="25" x2="50" y2="18.5" class="hand sub-dial-hand" id="minute-hand" />
    <line x1="50" y1="40" x2="50" y2="05" class="hand" id="second-hand" />
    <foreignObject y="80" width="100" height="20">
      <time xmlns="http://www.w3.org/1999/xhtml" id="clock-text" datetime="PT0M0.0S">0:00.0</time>
    </foreignObject>
  </svg>
</div>
