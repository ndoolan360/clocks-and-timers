<div class="wrapper">
  <form class="component-controls">
    <fieldset>
      <legend class="sr-only">Timer Controls</legend>
      <button id="settings-btn" type="button" title="Timer settings" aria-label="Timer settings" popovertarget="settings-popover">⚙️</button>
      <button id="pause-btn" type="button" title="Pause timer" aria-label="Pause timer" disabled>⏸︎</button>
      <button id="remove-btn" type="button" title="Remove timer" aria-label="Remove timer" disabled>🗑️</button>
    </fieldset>
  </form>
  <div id="settings-popover" popover="auto">
    <button class="popover-close" type="button" popovertarget="settings-popover" popovertargetaction="hide" title="Close" aria-label="Close">✕</button>
    <div id="settings-form">
      <div class="label" role="group" aria-label="Preset durations">
        <span>Duration</span>
        <div class="preset-chips" role="group" aria-label="Preset durations">
          <button type="button" class="preset-chip" popovertarget="settings-popover" popovertargetaction="hide" data-duration="60">1m</button>
          <button type="button" class="preset-chip" popovertarget="settings-popover" popovertargetaction="hide" data-duration="120">2m</button>
          <button type="button" class="preset-chip" popovertarget="settings-popover" popovertargetaction="hide" data-duration="300">5m</button>
          <button type="button" class="preset-chip" popovertarget="settings-popover" popovertargetaction="hide" data-duration="600">10m</button>
          <button type="button" class="preset-chip" popovertarget="settings-popover" popovertargetaction="hide" data-duration="900">15m</button>
          <button type="button" class="preset-chip" popovertarget="settings-popover" popovertargetaction="hide" data-duration="1800">30m</button>
          <button type="button" class="preset-chip" popovertarget="settings-popover" popovertargetaction="hide" data-duration="3600">1h</button>
          <button type="button" class="preset-chip" popovertarget="settings-popover" popovertargetaction="hide" data-duration="7200">2h</button>
          <button type="button" class="preset-chip" id="custom-chip">Custom</button>
        </div>
      </div>
      <label class="label custom-duration" hidden>
        <span>Custom Duration (seconds)</span>
        <input id="setting-duration" type="number" name="duration" min="1" max="86400" step="1" />
      </label>
    </div>
  </div>
  <svg id="timer" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="40" id="progress-background" />
    <circle cx="50" cy="50" r="40" id="progress-ring" />
    <foreignObject width="100" height="100">
      <div class="timer-meta" xmlns="http://www.w3.org/1999/xhtml">
        <time id="timer-text" datetime=""></time>
      </div>
    </foreignObject>
  </svg>
</div>
