<div class="wrapper">
  <form class="component-controls">
    <fieldset>
      <legend class="sr-only">Timer Controls</legend>
      <button id="settings-btn" type="button" title="Timer settings" aria-label="Timer settings"
        popovertarget="settings-popover">⚙️</button>
      <button id="pause-btn" type="button" title="Start timer" aria-label="Start timer" disabled>▶︎</button>
      <button id="reset-btn" type="button" title="Reset timer" aria-label="Reset timer" disabled>↻</button>
      <button id="remove-btn" type="button" title="Remove timer" aria-label="Remove timer" disabled>🗑️</button>
    </fieldset>
  </form>
  <div id="settings-popover" popover="auto">
    <button class="popover-close" type="button" popovertarget="settings-popover" popovertargetaction="hide"
      title="Close" aria-label="Close">✕</button>
    <div id="settings-form">
      <div class="label" role="group" aria-label="Preset durations">
        <span>Duration</span>
        <div class="preset-chips" role="group" aria-label="Preset durations">
          <button type="button" data-duration="60" popovertarget="settings-popover"
            popovertargetaction="hide">1m</button>
          <button type="button" data-duration="120" popovertarget="settings-popover"
            popovertargetaction="hide">2m</button>
          <button type="button" data-duration="300" popovertarget="settings-popover"
            popovertargetaction="hide">5m</button>
          <button type="button" data-duration="600" popovertarget="settings-popover"
            popovertargetaction="hide">10m</button>
          <button type="button" data-duration="900" popovertarget="settings-popover"
            popovertargetaction="hide">15m</button>
          <button type="button" data-duration="1800" popovertarget="settings-popover"
            popovertargetaction="hide">30m</button>
          <button type="button" data-duration="3600" popovertarget="settings-popover"
            popovertargetaction="hide">1h</button>
          <button type="button" data-duration="7200" popovertarget="settings-popover"
            popovertargetaction="hide">2h</button>
          <button type="button" id="custom-chip">Custom</button>
        </div>
      </div>
      <div class="custom-fields" hidden>
        <label class="label">
          <span>Custom Duration (seconds)</span>
          <input id="setting-duration" type="number" name="duration" min="1" max="86400" step="1" />
        </label>
      </div>
    </div>
  </div>
  <svg id="timer" class="inset-svg" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="40" id="progress-background" />
    <circle cx="50" cy="50" r="40" id="progress-ring" />
    <foreignObject width="100" height="100">
      <div id="timer-meta" xmlns="http://www.w3.org/1999/xhtml">
        <time id="timer-text" datetime=""></time>
      </div>
    </foreignObject>
  </svg>
</div>
