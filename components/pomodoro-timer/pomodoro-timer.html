<div class="wrapper">
  <form class="component-controls">
    <fieldset>
      <legend class="sr-only">Pomodoro Controls</legend>
      <button id="settings-btn" type="button" title="Pomodoro settings" aria-label="Pomodoro settings" popovertarget="settings-popover">⚙️</button>
      <button id="pause-btn" type="button" title="Start timer" aria-label="Start timer" disabled>▶︎</button>
      <button id="reset-btn" type="button" title="Reset pomodoro" aria-label="Reset pomodoro" disabled>↻</button>
      <button id="remove-btn" type="button" title="Remove pomodoro" aria-label="Remove pomodoro" disabled>🗑️</button>
    </fieldset>
  </form>
  <div id="settings-popover" popover="auto">
    <button class="popover-close" type="button" popovertarget="settings-popover" popovertargetaction="hide" title="Close" aria-label="Close">✕</button>
    <div id="settings-form">
      <div class="label">
        <span>Preset</span>
        <div class="preset-chips" role="group" aria-label="Preset configurations">
          <button type="button" popovertarget="settings-popover" popovertargetaction="hide" data-work="1500" data-short-break="300" data-long-break="900" data-rounds="4">Classic 25/5</button>
          <button type="button" popovertarget="settings-popover" popovertargetaction="hide" data-work="900" data-short-break="180" data-long-break="600" data-rounds="4">Short 15/3</button>
          <button type="button" popovertarget="settings-popover" popovertargetaction="hide" data-work="3000" data-short-break="600" data-long-break="1200" data-rounds="4">Long 50/10</button>
          <button type="button" id="custom-chip">Custom</button>
        </div>
      </div>
      <div class="custom-fields" hidden>
        <label class="label">
          <span>Work (seconds)</span>
          <input id="setting-work" type="number" name="work" min="1" max="86400" step="1" />
        </label>
        <label class="label">
          <span>Rounds</span>
          <input id="setting-rounds" type="number" name="rounds" min="1" max="99" step="1" />
        </label>
        <label class="label">
          <span id="short-break-label">Short break (seconds)</span>
          <input id="setting-short-break" type="number" name="short-break" min="1" max="86400" step="1" />
        </label>
        <label class="label">
          <span id="long-break-label">Break (seconds)</span>
          <input id="setting-long-break" type="number" name="long-break" min="1" max="86400" step="1" />
        </label>
      </div>
    </div>
  </div>
  <svg id="timer" viewBox="0 0 100 100">
    <g id="segments-bg" class="segments"></g>
    <g id="segments-fg" class="segments"></g>
    <foreignObject width="100" height="100">
      <div id="timer-meta" xmlns="http://www.w3.org/1999/xhtml">
        <time id="timer-text" datetime=""></time>
        <span id="phase-label" aria-live="polite"></span>
      </div>
    </foreignObject>
  </svg>
</div>
